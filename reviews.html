  .hero > * { position: relative; z-index: 1; }
  .hero-label { font-size: 0.68rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 300; color: var(--white); line-height: 1.15; }
  .hero-title em { font-style: italic; color: var(--gold-light); }
  .hero-sub { margin-top: 14px; font-size: 0.88rem; color: rgba(255,255,255,0.5); line-height: 1.7; }

  .container { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; }

  /* 평균 별점 */
  .avg-box {
    background: var(--charcoal);
    padding: 32px;
    text-align: center;
    margin-bottom: 40px;
    border: 1px solid var(--border);
  }
  .avg-score { font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 300; color: var(--gold-light); line-height: 1; }
  .avg-stars { font-size: 1.6rem; margin: 8px 0; letter-spacing: 4px; }
  .avg-count { font-size: 0.78rem; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; }

  /* 후기 작성 폼 */
  .write-section { margin-bottom: 48px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: var(--charcoal); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

  .star-select { display: flex; gap: 8px; margin-bottom: 20px; }
  .star-btn { font-size: 2rem; cursor: pointer; color: #ddd; transition: color 0.15s; background: none; border: none; padding: 0; line-height: 1; }
  .star-btn.active { color: var(--star); }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em; color: var(--warm-gray); text-transform: uppercase; margin-bottom: 8px; }
  .form-input, .form-textarea { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(30,30,30,0.15); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--charcoal); outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-textarea:focus { border-color: var(--gold); }
  .form-textarea { resize: vertical; min-height: 110px; }

  .submit-btn { width: 100%; padding: 15px; background: var(--gold); color: var(--white); border: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.25s; margin-top: 4px; }
  .submit-btn:hover { background: var(--charcoal); }

  /* 후기 목록 */
  .reviews-list { display: flex; flex-direction: column; gap: 20px; }
  .review-card { background: var(--white); border: 1px solid rgba(30,30,30,0.1); padding: 24px; }
  .review-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .review-name { font-weight: 500; font-size: 0.92rem; color: var(--charcoal); }
  .review-date { font-size: 0.72rem; color: var(--warm-gray); }
  .review-stars { color: var(--star); font-size: 1rem; letter-spacing: 2px; margin-bottom: 10px; }
  .review-text { font-size: 0.88rem; color: var(--warm-gray); line-height: 1.75; }

  .empty-msg { text-align: center; padding: 48px 24px; color: var(--warm-gray); font-size: 0.88rem; line-height: 1.7; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  .success-toast {
    display: none;
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--charcoal); color: var(--white);
    padding: 14px 28px; font-size: 0.88rem;
    border-left: 3px solid var(--gold);
    z-index: 999; white-space: nowrap;
    animation: slideUp 0.3s ease;
  }
  .success-toast.show { display: block; }
  @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Guesthouse · Queen Creek</a>
  <a href="index.html" class="nav-back">← 홈으로</a>
</nav>

<div class="hero">
  <div class="hero-label">Guest Reviews</div>
  <h1 class="hero-title">게스트 후기</h1>
  <p class="hero-sub">머무셨던 경험을 공유해 주세요 😊</p>
</div>

<div class="container">

  <!-- 평균 별점 -->
  <div class="avg-box">
    <div class="avg-score" id="avgScore">-</div>
    <div class="avg-stars" id="avgStars">☆☆☆☆☆</div>
    <div class="avg-count" id="avgCount">아직 후기가 없어요</div>
  </div>

  <!-- 후기 작성 -->
  <div class="write-section">
    <div class="section-title">후기 작성하기</div>

    <div class="form-group">
      <div class="form-label">별점</div>
      <div class="star-select" id="starSelect">
        <button class="star-btn" onclick="setStar(1)">★</button>
        <button class="star-btn" onclick="setStar(2)">★</button>
        <button class="star-btn" onclick="setStar(3)">★</button>
        <button class="star-btn" onclick="setStar(4)">★</button>
        <button class="star-btn" onclick="setStar(5)">★</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">이름 (닉네임 가능)</label>
      <input class="form-input" type="text" id="reviewName" placeholder="예: 김철수 / 익명">
    </div>

    <div class="form-group">
      <label class="form-label">후기</label>
      <textarea class="form-textarea" id="reviewText" placeholder="숙소에서의 경험을 자유롭게 작성해 주세요 😊"></textarea>
    </div>

    <button class="submit-btn" onclick="submitReview()">✏️ 후기 등록하기</button>
  </div>

  <!-- 후기 목록 -->
  <div class="section-title">전체 후기</div>
  <div class="reviews-list" id="reviewsList">
    <div class="empty-msg">
      <div class="empty-icon">💬</div>
      아직 후기가 없어요.<br>첫 번째 후기를 남겨주세요!
    </div>
  </div>

</div>

<div class="success-toast" id="toast">✅ 후기가 등록됐어요! 감사합니다 😊</div>

<script>
  let selectedStar = 0;
  let reviews = JSON.parse(localStorage.getItem('guesthouse_reviews') || '[]');

  function setStar(n) {
    selectedStar = n;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i < n);
    });
  }

  function submitReview() {
    const name = document.getElementById('reviewName').value.trim();
    const text = document.getElementById('reviewText').value.trim();
    if (!selectedStar) { alert('별점을 선택해 주세요!'); return; }
    if (!name) { alert('이름을 입력해 주세요!'); return; }
    if (!text) { alert('후기 내용을 입력해 주세요!'); return; }

    const review = {
      name, text, star: selectedStar,
      date: new Date().toLocaleDateString('ko-KR')
    };
    reviews.unshift(review);
    localStorage.setItem('guesthouse_reviews', JSON.stringify(reviews));

    // 초기화
    document.getElementById('reviewName').value = '';
    document.getElementById('reviewText').value = '';
    setStar(0); selectedStar = 0;

    renderReviews();
    showToast();
  }

  function renderReviews() {
    const list = document.getElementById('reviewsList');
    if (reviews.length === 0) {
      list.innerHTML = `<div class="empty-msg"><div class="empty-icon">💬</div>아직 후기가 없어요.<br>첫 번째 후기를 남겨주세요!</div>`;
      document.getElementById('avgScore').textContent = '-';
      document.getElementById('avgStars').textContent = '☆☆☆☆☆';
      document.getElementById('avgCount').textContent = '아직 후기가 없어요';
      return;
    }

    // 평균 계산
    const avg = (reviews.reduce((s,r) => s + r.star, 0) / reviews.length).toFixed(1);
    const fullStars = Math.round(avg);
    document.getElementById('avgScore').textContent = avg;
    document.getElementById('avgStars').textContent = '★'.repeat(fullStars) + '☆'.repeat(5 - fullStars);
    document.getElementById('avgCount').textContent = `총 ${reviews.length}개의 후기`;

    list.innerHTML = reviews.map(r => `
      <div class="review-card">
        <div class="review-top">
          <div class="review-name">${r.name}</div>
          <div class="review-date">${r.date}</div>
        </div>
        <div class="review-stars">${'★'.repeat(r.star)}${'☆'.repeat(5-r.star)}</div>
        <div class="review-text">${r.text}</div>
      </div>
    `).join('');
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  renderReviews();
</script>
</body>
</html>
